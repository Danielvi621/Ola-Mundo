<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chá de Panela - Daniel & Eduarda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #FDFCFB; 
            color: #1B365D; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; 
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .pattern-blue {
            background-color: #1B365D;
            background-image: repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05) 1px, transparent 1px, transparent 12px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .category-bubble { aspect-ratio: 1 / 1; border-radius: 40px; transition: all 0.4s ease; }
        @media (min-width: 768px) { .category-bubble { border-radius: 65px; } }
        .item-card { border-radius: 30px; transition: all 0.3s ease; }
        @media (min-width: 768px) { .item-card { border-radius: 45px; } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .modal-overlay { background: rgba(27, 54, 93, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div class="fixed top-16 -left-8 animate-float opacity-20 pointer-events-none z-0">
        <svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" fill="#FACC15" /><path d="M50 18Q55 5 75 12" stroke="#4D7C0F" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="fixed bottom-24 -right-10 animate-float opacity-20 pointer-events-none z-0" style="animation-delay: 2s">
        <svg width="120" height="120" viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" fill="#FACC15" /><path d="M50 18Q55 5 75 12" stroke="#4D7C0F" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
    </div>

    <header class="relative pt-10 pb-12 text-center bg-white border-b-[6px] border-[#1B365D] shadow-xl z-10 px-4">
        <div id="countdown-container" class="mb-5">
            <div id="countdown" class="inline-flex items-center justify-center gap-2 bg-[#FDF9F0] border border-[#FACC15] px-6 py-2 rounded-full font-bold text-[10px] md:text-[12px] tracking-widest text-[#1B365D]">
                <i data-lucide="calendar-heart" class="w-4 h-4 text-[#FACC15]"></i>
                A CALCULAR...
            </div>
        </div>
        <p class="text-[10px] md:text-xs italic text-[#1B365D]/60 font-black tracking-widest uppercase mb-3">Chá de Panela</p>
        <h1 class="text-4xl md:text-7xl font-serif font-light text-[#1B365D] mb-4 leading-tight">Daniel & Eduarda</h1>
        <div class="flex items-center justify-center gap-3 mb-2">
            <div class="h-px w-6 bg-[#FACC15]"></div>
            <p class="text-[9px] md:text-[11px] uppercase tracking-[0.4em] font-black opacity-60">09 de Junho de 2026</p>
            <div class="h-px w-6 bg-[#FACC15]"></div>
        </div>
    </header>

    <main id="main-content" class="max-w-4xl mx-auto px-4 md:px-6 py-12 relative z-10"></main>

    <footer class="py-20 text-center text-white border-t-[10px] border-[#FACC15] pattern-blue relative overflow-hidden px-4">
        <div class="relative z-10">
            <div class="flex justify-center items-center gap-4 mb-8">
                <div class="h-[2px] w-10 bg-[#FACC15]/40"></div>
                <span class="text-4xl md:text-5xl font-serif text-[#FACC15] italic">D & E</span>
                <div class="h-[2px] w-10 bg-[#FACC15]/40"></div>
            </div>
            <p class="text-white/70 text-sm md:text-lg italic mb-10 leading-relaxed max-w-sm mx-auto">"O amor é o ingrediente principal da nossa nova casa."</p>
            <div class="inline-block bg-[#FACC15] text-[#1B365D] px-10 py-3 rounded-full font-black text-xs tracking-[0.4em] shadow-xl">09.06.2026</div>
        </div>
    </footer>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-6 modal-overlay hidden">
        <div class="bg-white max-w-sm w-full p-8 md:p-10 rounded-[40px] md:rounded-[50px] border-b-[8px] md:border-b-[12px] border-[#FACC15] shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-2 text-[#1B365D]/30 hover:text-[#1B365D] active:scale-90 transition-all rounded-full bg-stone-50">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-[#1B365D] text-[#FACC15] px-6 py-4 rounded-[30px] shadow-2xl flex items-center gap-4 opacity-0 transition-all transform translate-y-10 z-50">
        <div class="bg-[#FACC15] p-2 rounded-full shrink-0"><i data-lucide="heart" class="w-4 h-4 fill-[#1B365D] text-[#1B365D]"></i></div>
        <div class="flex flex-col overflow-hidden">
            <span class="text-[11px] font-black uppercase tracking-widest truncate">Agradecemos!</span>
            <span class="text-[9px] text-white/80 uppercase truncate">Recebemos o seu presente.</span>
        </div>
    </div>

    <script>
        const weddingDate = new Date('2026-06-09T00:00:00');
        const pixKey = "62998808828";
        
        let state = {
            view: 'home',
            activeCategory: null,
            selectedGift: null,
            pixStep: false
        };

        const categories = [
            { id: 'Cozinha', icon: 'utensils', label: 'Cozinha', desc: 'Panelas & Utensílios' },
            { id: 'MesaPosta', icon: 'coffee', label: 'Mesa Posta', desc: 'Servir com Estilo' },
            { id: 'Eletros', icon: 'zap', label: 'Eletros', desc: 'Praticidade Diária' },
            { id: 'Quarto', icon: 'bed', label: 'Quarto', desc: 'Cama & Conforto' },
            { id: 'Banheiro', icon: 'shower-head', label: 'Banheiro', desc: 'Banho & Higiene' },
            { id: 'Decoracao', icon: 'palette', label: 'Decoração', desc: 'Detalhes do Lar' }
        ];

        let gifts = [
            { id: 1, title: 'Conjunto de Panelas Antiaderentes', category: 'Cozinha', image: 'https://images.unsplash.com/photo-1584990344616-3b94b305740a?q=80&w=800&auto=format&fit=crop', desc: 'Praticidade e estilo para o dia a dia.' },
            { id: 2, title: 'Jogo de Potes de Vidro Herméticos', category: 'Cozinha', image: 'https://images.unsplash.com/photo-1583337130417-3346a1be7dee?q=80&w=800&auto=format&fit=crop', desc: 'Para armazenar com segurança e beleza.' },
            { id: 3, title: 'Faqueiro Inox 72 Peças', category: 'Cozinha', image: 'https://images.unsplash.com/photo-1593611664162-ef3015de1c1c?q=80&w=800&auto=format&fit=crop', desc: 'Durabilidade e elegância à mesa.' },
            { id: 4, title: 'Conjunto de Assadeiras de Vidro', category: 'Cozinha', image: 'https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?q=80&w=800&auto=format&fit=crop', desc: 'Perfeitas para receitas assadas.' },
            { id: 5, title: 'Kit Colheres de Silicone Premium', category: 'Cozinha', image: 'https://images.unsplash.com/photo-1556910103-1c02745a872e?q=80&w=800&auto=format&fit=crop', desc: 'Para não riscar panelas.' },
            { id: 6, title: 'Aparelho de Jantar 30 Peças', category: 'MesaPosta', image: 'https://images.unsplash.com/photo-1610701596007-11502861dcfa?q=80&w=800&auto=format&fit=crop', desc: 'Louça completa para todos os momentos.' },
            { id: 7, title: 'Jogo de Taças de Cristal', category: 'MesaPosta', image: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?q=80&w=800&auto=format&fit=crop', desc: 'Para brindes inesquecíveis.' },
            { id: 8, title: 'Kit Sousplat de Rattan', category: 'MesaPosta', image: 'https://images.unsplash.com/photo-1606859191214-25806e8e2423?q=80&w=800&auto=format&fit=crop', desc: 'Charme rústico ao servir.' },
            { id: 9, title: 'Tábua de Frios em Bambu', category: 'MesaPosta', image: 'https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=800&auto=format&fit=crop', desc: 'Ideal para servir com requinte.' },
            { id: 10, title: 'Conjunto de Xícaras de Chá', category: 'MesaPosta', image: 'https://images.unsplash.com/photo-1577937927133-66ef06acdf18?q=80&w=800&auto=format&fit=crop', desc: 'Para os melhores encontros.' },
            { id: 11, title: 'Air Fryer 5L Preto/Inox', category: 'Eletros', image: 'https://images.unsplash.com/photo-1628840042765-356cda07504e?q=80&w=800&auto=format&fit=crop', desc: 'Praticidade e saúde em um só item.' },
            { id: 12, title: 'Cafeteira Espresso Moderna', category: 'Eletros', image: 'https://images.unsplash.com/photo-1517088455889-bfa75135412c?q=80&w=800&auto=format&fit=crop', desc: 'O café que transforma o dia.' },
            { id: 13, title: 'Liquidificador Alta Potência', category: 'Eletros', image: 'https://images.unsplash.com/photo-1585237401525-4c0429fec81e?q=80&w=800&auto=format&fit=crop', desc: 'Velocidade e força para receitas.' },
            { id: 14, title: 'Batedeira Planetária', category: 'Eletros', image: 'https://images.unsplash.com/photo-1594385208974-2e75f9d8a847?q=80&w=800&auto=format&fit=crop', desc: 'Para preparar bolos e massas.' },
            { id: 15, title: 'Mixer de Mão 3 em 1', category: 'Eletros', image: 'https://images.unsplash.com/photo-1585515320310-259814833e62?q=80&w=800&auto=format&fit=crop', desc: 'Utensílio rápido e versátil.' },
            { id: 16, title: 'Jogo de Cama Casal 400 Fios', category: 'Quarto', image: 'https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?q=80&w=800&auto=format&fit=crop', desc: 'Conforto supremo todas as noites.' },
            { id: 17, title: 'Edredom Casal Matelassê', category: 'Quarto', image: 'https://images.unsplash.com/photo-1632323344907-6e9930ebabb5?q=80&w=800&auto=format&fit=crop', desc: 'Maciez e elegância para o quarto.' },
            { id: 18, title: 'Par de Travesseiros Anatômicos', category: 'Quarto', image: 'https://images.unsplash.com/photo-1584100936595-c0654b55a2e2?q=80&w=800&auto=format&fit=crop', desc: 'Apoio saudável para dormir bem.' },
            { id: 19, title: 'Manta Decorativa Tricot', category: 'Quarto', image: 'https://images.unsplash.com/photo-1580828369062-84196d445c48?q=80&w=800&auto=format&fit=crop', desc: 'Para aquecer as noites e decorar.' },
            { id: 20, title: 'Protetor de Colchão Impermeável', category: 'Quarto', image: 'https://images.unsplash.com/photo-1629198688000-71f23e745b6e?q=80&w=800&auto=format&fit=crop', desc: 'Higiene e segurança da cama.' },
            { id: 21, title: 'Jogo de Toalhas 5 Peças', category: 'Banheiro', image: 'https://images.unsplash.com/photo-1560343776-97e7d202ff0e?q=80&w=800&auto=format&fit=crop', desc: 'Toalhas macias para o dia a dia.' },
            { id: 22, title: 'Kit Lavabo Cerâmica 3 Peças', category: 'Banheiro', image: 'https://images.unsplash.com/photo-1620626011761-9963d7b59a7a?q=80&w=800&auto=format&fit=crop', desc: 'Organize o banheiro com estilo.' },
            { id: 23, title: 'Par de Roupões Microfibra', category: 'Banheiro', image: 'https://images.unsplash.com/photo-1584984275066-8573c246f6dc?q=80&w=800&auto=format&fit=crop', desc: 'O máximo conforto após o banho.' },
            { id: 24, title: 'Cesto de Roupas em Bambu', category: 'Banheiro', image: 'https://images.unsplash.com/photo-1602016738914-523c914b1b36?q=80&w=800&auto=format&fit=crop', desc: 'Design limpo e funcional.' },
            { id: 25, title: 'Tapete Antiderrapante Felpudo', category: 'Banheiro', image: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=800&auto=format&fit=crop', desc: 'Segurança e suavidade ao sair do banho.' },
            { id: 26, title: 'Luminária de Mesa Moderna', category: 'Decoracao', image: 'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?q=80&w=800&auto=format&fit=crop', desc: 'Iluminação sofisticada para ler.' },
            { id: 27, title: 'Vaso Decorativo Âmbar', category: 'Decoracao', image: 'https://images.unsplash.com/photo-1581783898377-1c85bf937427?q=80&w=800&auto=format&fit=crop', desc: 'Para encher de vida qualquer ambiente.' },
            { id: 28, title: 'Difusor de Aromas Elétrico', category: 'Decoracao', image: 'https://images.unsplash.com/photo-1608528577891-eb05ebec2108?q=80&w=800&auto=format&fit=crop', desc: 'Para deixar o lar sempre perfumado.' },
            { id: 29, title: 'Bandeja Espelhada', category: 'Decoracao', image: 'https://images.unsplash.com/photo-1601660991965-0fcb29bde8cb?q=80&w=800&auto=format&fit=crop', desc: 'Ideal para decorar e servir.' },
            { id: 30, title: 'Relógio de Parede Minimalista', category: 'Decoracao', image: 'https://images.unsplash.com/photo-1508013861974-9f6347163ebe?q=80&w=800&auto=format&fit=crop', desc: 'Para marcar o tempo com elegância.' }
        ];

        function init() {
            updateCountdown();
            render();
            setInterval(updateCountdown, 60000);
        }

        function updateCountdown() {
            const now = new Date();
            const diff = weddingDate.getTime() - now.getTime();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerHTML = `<i data-lucide="calendar-heart" class="w-4 h-4 text-[#FACC15]"></i> FALTAM ${days} DIAS`;
            lucide.createIcons();
        }

        function render() {
            const container = document.getElementById('main-content');
            
            if (state.view === 'home') {
                container.innerHTML = `
                    <div class="text-center mb-10 md:mb-14">
                        <h2 class="text-2xl md:text-3xl font-serif text-[#1B365D] mb-3">Departamentos</h2>
                        <div class="w-12 h-1 bg-[#FACC15] mx-auto mb-4"></div>
                        <p class="text-[9px] md:text-[10px] uppercase font-black tracking-widest opacity-40">Toque para ver a lista</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 md:gap-8 max-w-2xl mx-auto">
                        ${categories.map(cat => `
                            <button onclick="navigate('${cat.id}')" class="category-bubble bg-white border-2 border-[#1B365D]/10 p-5 md:p-8 flex flex-col items-center justify-center hover:bg-[#FACC15]/5 focus:bg-[#FACC15]/10">
                                <div class="w-12 h-12 md:w-16 md:h-16 bg-[#1B365D] text-[#FACC15] rounded-full flex items-center justify-center mb-3 md:mb-4 shadow-md">
                                    <i data-lucide="${cat.icon}" class="w-6 h-6 md:w-8 md:h-8"></i>
                                </div>
                                <span class="text-base md:text-xl font-serif mb-1 leading-tight">${cat.label}</span>
                                <span class="text-[8px] md:text-[9px] uppercase tracking-widest font-black opacity-30 text-center leading-tight hidden md:block">${cat.desc}</span>
                            </button>
                        `).join('')}
                    </div>
                `;
            } else {
                const categoryGifts = gifts.filter(g => g.category === state.activeCategory);
                const catInfo = categories.find(c => c.id === state.activeCategory);
                
                container.innerHTML = `
                    <div class="flex flex-col items-center mb-10 bg-[#1B365D] p-6 md:p-10 rounded-[30px] md:rounded-[40px] text-white shadow-xl pattern-blue">
                        <button onclick="goHome()" class="flex items-center gap-2 text-[#FACC15] text-[10px] font-black uppercase tracking-widest border border-[#FACC15]/30 px-5 py-2 rounded-full active:scale-90 transition-all mb-4">
                            <i data-lucide="chevron-left" class="w-4 h-4"></i> Voltar
                        </button>
                        <h2 class="text-2xl md:text-4xl font-serif text-[#FACC15] mb-2">${catInfo.label}</h2>
                        <p class="text-[9px] font-bold opacity-80 tracking-widest uppercase">${categoryGifts.length} Opções Disponíveis</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 md:gap-8">
                        ${categoryGifts.map(gift => `
                            <div class="item-card bg-white border border-[#1B365D]/10 overflow-hidden flex flex-col shadow-sm pb-4">
                                <div class="aspect-square relative overflow-hidden bg-[#F7F3F0]">
                                    <img src="${gift.image}" loading="lazy" class="w-full h-full object-cover">
                                </div>
                                <div class="px-3 pt-4 pb-2 md:px-6 md:pt-6 md:pb-4 text-center flex flex-col flex-grow">
                                    <h3 class="text-sm md:text-lg font-serif mb-2 text-[#1B365D] leading-tight line-clamp-2">${gift.title}</h3>
                                    <p class="text-[9px] md:text-[11px] opacity-50 italic mb-4 md:mb-6 line-clamp-2 flex-grow">${gift.desc}</p>
                                    <button onclick="openModal(${gift.id})" class="w-full py-3 md:py-4 bg-[#FACC15] text-[#1B365D] rounded-full text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] shadow-md hover:bg-[#FACC15]/80 transition-all">Presentear</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function navigate(catId) {
            state.view = 'category';
            state.activeCategory = catId;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            state.view = 'home';
            state.activeCategory = null;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openModal(giftId) {
            state.selectedGift = gifts.find(g => g.id === giftId);
            state.pixStep = false;
            document.getElementById('modal').classList.remove('hidden');
            updateModalUI();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function updateModalUI() {
            const body = document.getElementById('modal-content');
            if (!state.pixStep) {
                body.innerHTML = `
                    <div class="text-center font-sans">
                        <div class="w-16 h-16 md:w-20 md:h-20 bg-[#FDF9F0] rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner text-[#FACC15]">
                            <i data-lucide="shopping-bag" class="w-8 h-8 md:w-10 md:h-10"></i>
                        </div>
                        <h2 class="text-xl md:text-2xl font-serif text-[#1B365D] mb-2">Finalizar Escolha</h2>
                        <p class="text-[9px] md:text-[10px] font-black opacity-40 uppercase tracking-widest mb-8 line-clamp-2">${state.selectedGift.title}</p>
                        <div class="text-left mb-8">
                            <label class="text-[9px] font-black opacity-50 uppercase ml-2 mb-1 block">Seu Nome / Família</label>
                            <input type="text" id="guest-name-input" placeholder="Ex: Maria Santos" class="w-full border-b-2 border-[#1B365D]/10 py-2 md:py-3 px-2 outline-none focus:border-[#FACC15] bg-[#F8F7F4] rounded"/>
                        </div>
                        <div class="space-y-3">
                            <button onclick="goToPix()" class="w-full py-4 bg-[#1B365D] text-[#FACC15] rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Presentear via Pix</button>
                            <button onclick="confirmSuccess()" class="w-full py-4 border-2 border-[#1B365D]/10 rounded-full text-[10px] font-black uppercase tracking-widest text-[#1B365D] active:bg-stone-50">Já paguei de outra forma</button>
                        </div>
                    </div>
                `;
            } else {
                body.innerHTML = `
                    <div class="text-center font-sans">
                        <h2 class="text-xl md:text-2xl font-serif text-[#1B365D] mb-2">Dados de Pagamento</h2>
                        <p class="text-[10px] text-[#1B365D]/50 italic mb-6">Valor: À sua escolha</p>
                        <div class="bg-[#FAF9F8] p-6 rounded-[30px] border border-[#1B365D]/10 mb-6 shadow-inner">
                            <div class="w-24 h-24 md:w-28 md:h-28 bg-white border border-[#1B365D]/10 mx-auto mb-4 flex items-center justify-center p-3">
                                <i data-lucide="qr-code" class="w-16 h-16 text-[#1B365D]/20"></i>
                            </div>
                            <p class="text-[8px] uppercase font-black opacity-40 mb-2 tracking-widest">Toque para copiar a chave</p>
                            <button onclick="copyKey()" class="w-full bg-white p-3 rounded-full border border-[#1B365D]/10 flex items-center justify-between px-4 shadow-sm active:border-[#FACC15] transition-all">
                                <span class="text-[10px] md:text-[11px] font-mono font-bold text-[#1B365D] truncate">${pixKey}</span>
                                <i data-lucide="copy" class="w-4 h-4 text-[#FACC15]"></i>
                            </button>
                        </div>
                        <button onclick="confirmSuccess()" class="w-full py-4 bg-[#1B365D] text-[#FACC15] rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Confirmei o Pix!</button>
                        <button onclick="backToSelection()" class="mt-5 text-[9px] font-black opacity-40 uppercase tracking-widest p-2">Voltar</button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function goToPix() {
            const name = document.getElementById('guest-name-input').value;
            if(!name.trim()) {
                document.getElementById('guest-name-input').style.borderColor = 'red';
                setTimeout(()=> document.getElementById('guest-name-input').style.borderColor = '', 1000);
                return;
            }
            state.pixStep = true;
            updateModalUI();
        }

        function backToSelection() {
            state.pixStep = false;
            updateModalUI();
        }

        function confirmSuccess() {
            closeModal();
            const index = gifts.findIndex(g => g.id === state.selectedGift.id);
            if(index > -1) gifts.splice(index, 1);
            render();
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 40px)';
            }, 4000);
        }

        function copyKey() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(pixKey).then(() => {
                    showCopyFeedback();
                }).catch(err => {
                    fallbackCopyTextToClipboard();
                });
            } else {
                fallbackCopyTextToClipboard();
            }
        }

        function fallbackCopyTextToClipboard() {
            const textArea = document.createElement("textarea");
            textArea.value = pixKey;
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.width = "2em";
            textArea.style.height = "2em";
            textArea.style.padding = "0";
            textArea.style.border = "none";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showCopyFeedback();
            } catch (err) {
                console.error('Erro ao copiar', err);
            }
            document.body.removeChild(textArea);
        }

        function showCopyFeedback() {
            const btn = document.querySelector('button[onclick="copyKey()"] i');
            if(btn) {
                const originalIcon = btn.getAttribute('data-lucide');
                btn.setAttribute('data-lucide', 'check');
                btn.classList.add('text-green-500');
                lucide.createIcons();
                setTimeout(() => {
                    btn.setAttribute('data-lucide', originalIcon);
                    btn.classList.remove('text-green-500');
                    lucide.createIcons();
                }, 2000);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
